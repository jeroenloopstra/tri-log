<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Tri Log</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f4c5c">

<!-- iOS home screen support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tri Log">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <h1>Tri Log</h1>
  <button id="addBtn" class="icon-btn" aria-label="Add race">+</button>
</header>

<main id="listView" class="view">
  <div id="emptyState" class="empty-state hidden">
    <p>No races yet.</p>
    <p>Tap + to add your first result.</p>
  </div>
  <ul id="raceList" class="race-list"></ul>
</main>

<main id="detailView" class="view hidden">
  <div class="detail-header">
    <button id="backBtn" class="text-btn">‹ Back</button>
    <button id="editBtn" class="text-btn">Edit</button>
    <button id="deleteBtn" class="text-btn danger">Delete</button>
  </div>
  <div id="detailContent"></div>
</main>

<main id="formView" class="view hidden">
  <form id="raceForm">
    <div class="detail-header">
      <button type="button" id="cancelBtn" class="text-btn">Cancel</button>
      <h2 id="formTitle">New Race</h2>
      <button type="submit" class="text-btn primary">Save</button>
    </div>

    <label class="field">
      <span>Photo</span>
      <input type="file" id="photoInput" accept="image/*" capture="environment">
      <img id="photoPreview" class="photo-preview hidden" alt="Preview">
    </label>

    <label class="field">
      <span>Race name</span>
      <input type="text" id="nameInput" required placeholder="e.g. Ironman 70.3">
    </label>

    <label class="field">
      <span>Date</span>
      <input type="date" id="dateInput">
    </label>

    <fieldset class="segment">
      <legend>Swim</legend>
      <label class="subfield">
        <span>Distance (m)</span>
        <input type="number" id="swimDist" min="0" step="1" inputmode="numeric">
      </label>
      <div class="time-input" data-target="swimTime">
        <span>Time</span>
        <div class="hms">
          <input type="number" min="0" max="59" placeholder="hh" class="h">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="mm" class="m">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="ss" class="s">
        </div>
      </div>
    </fieldset>

    <fieldset class="segment">
      <legend>Transition 1 (T1)</legend>
      <div class="time-input" data-target="t1Time">
        <span>Time</span>
        <div class="hms">
          <input type="number" min="0" max="59" placeholder="hh" class="h">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="mm" class="m">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="ss" class="s">
        </div>
      </div>
    </fieldset>

    <fieldset class="segment">
      <legend>Bike</legend>
      <label class="subfield">
        <span>Distance (km)</span>
        <input type="number" id="bikeDist" min="0" step="0.1" inputmode="decimal">
      </label>
      <div class="time-input" data-target="bikeTime">
        <span>Time</span>
        <div class="hms">
          <input type="number" min="0" max="59" placeholder="hh" class="h">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="mm" class="m">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="ss" class="s">
        </div>
      </div>
    </fieldset>

    <fieldset class="segment">
      <legend>Transition 2 (T2)</legend>
      <div class="time-input" data-target="t2Time">
        <span>Time</span>
        <div class="hms">
          <input type="number" min="0" max="59" placeholder="hh" class="h">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="mm" class="m">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="ss" class="s">
        </div>
      </div>
    </fieldset>

    <fieldset class="segment">
      <legend>Run</legend>
      <label class="subfield">
        <span>Distance (km)</span>
        <input type="number" id="runDist" min="0" step="0.1" inputmode="decimal">
      </label>
      <div class="time-input" data-target="runTime">
        <span>Time</span>
        <div class="hms">
          <input type="number" min="0" max="59" placeholder="hh" class="h">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="mm" class="m">
          <span>:</span>
          <input type="number" min="0" max="59" placeholder="ss" class="s">
        </div>
      </div>
    </fieldset>

    <div class="total-row">
      <span>Total time</span>
      <strong id="totalTimeDisplay">00:00:00</strong>
    </div>
  </form>
</main>

<script src="js/db.js"></script>
<script src="js/app.js"></script>
</body>
</html>
